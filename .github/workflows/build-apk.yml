name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: pnpm installieren
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Dependencies installieren
        run: pnpm install

      - name: App bauen (Web)
        run: pnpm build

      - name: Capacitor installieren
        run: |
          echo "ignore-workspace-root-check=true" >> .npmrc
          pnpm add @capacitor/core @capacitor/cli @capacitor/android

      - name: Capacitor initialisieren
        run: npx cap init "RescueReady" "com.rescueready.app" --web-dir=dist

      - name: Android Plattform hinzufügen
        run: npx cap add android

      - name: Web-Code in Android kopieren
        run: npx cap sync android

      - name: APK bauen
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: RescueReady
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
