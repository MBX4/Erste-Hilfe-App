name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: pnpm installieren
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Dependencies installieren
        run: pnpm install --include-workspace-root

      - name: App bauen (Web)
        run: pnpm build

      - name: Capacitor installieren
        run: pnpm add --include-workspace-root @capacitor/core @capacitor/cli @capacitor/android

      - name: Capacitor initialisieren
        run: npx cap init "Erste Hilfe Lern App" "com.erstehilfe.lernapp" --web-dir=dist

      - name: Android Plattform
