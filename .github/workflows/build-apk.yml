name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: pnpm installieren
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Dependencies installieren
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)"
        run: pnpm install

      - name: App bauen (Web)
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)"
        run: pnpm build

      - name: Capacitor installieren
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)"
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Capacitor initialisieren
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)"
        run: npx cap init "Erste Hilfe Lern App" "com.erstehilfe.lernapp" --web-dir=dist

      - name: Android Plattform hinzufügen
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)"
        run: npx cap add android

      - name: Web-Code in Android kopieren
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)"
        run: npx cap sync android

      - name: APK bauen
        working-directory: "Erste-Hilfe-Lern-App Konzept (2)/android"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: erste-hilfe-app-v2
          path: "Erste-Hilfe-Lern-App Konzept (2)/android/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
